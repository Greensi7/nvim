name: Lua Formatting Check

on:
  pull_request:
    branches: [ "main" ]

jobs:
  stylua-check:
    name: Check StyLua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Formatting
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .
